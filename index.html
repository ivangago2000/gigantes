body{

.hero{

    background:
    linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.8)),

    background-size:cover;
    background-position:center;
}

.hero-content{
    padding:40px;
}

.hero h1{
    font-size:3rem;
    margin-bottom:15px;
}

.hero p{
    font-size:1.2rem;
    opacity:.8;
}

#search{
    margin-top:25px;
    width:500px;
    max-width:90%;
    padding:15px;
    border:none;
    border-radius:50px;
    font-size:1rem;
}

.stats{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:30px;
    flex-wrap:wrap;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    min-width:220px;
    text-align:center;
}

.card h2{
    color:#f59e0b;
}

.timeline{
    max-width:1400px;
    margin:auto;
    padding:40px;
}

/* TITULOS DE AÑO */

.titulo-año{
    font-size:3rem;
    font-weight:700;
    color:#fbbf24;
    margin-top:60px;
    margin-bottom:25px;
    border-left:8px solid #dc2626;
    padding-left:20px;
}

/* GRID DE EVENTOS POR AÑO */

.eventos-año{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.evento{
    background:#1e293b;
    border-radius:18px;
    overflow:hidden;
    transition:.3s;
}

.evento:hover{
    transform:translateY(-8px);
}

.evento-header{
    background:#dc2626;
    padding:15px;
    font-weight:bold;
    font-size:1.1rem;
}

.evento-content{
    padding:20px;
}

.fecha{
    color:#fbbf24;
    font-weight:700;
    margin-bottom:10px;
}

.lugar{
    font-size:1.3rem;
    margin-bottom:10px;
}

.motivo{
    color:#cbd5e1;
}

.comparsas{
    margin-top:15px;
}

.badge{
    display:inline-block;
    background:#2563eb;
    padding:6px 12px;
    margin:4px;
    border-radius:20px;
    font-size:0.85rem;
}

footer{
    text-align:center;
    padding:40px;
    opacity:.7;
}

@media(max-width:768px){

    .hero h1{
        font-size:2rem;
    }

    .titulo-año{
        font-size:2rem;
    }

}

</style>

const contenedor = document.getElementById("eventos");

document.getElementById("totalEventos").textContent = eventos.length;

function mostrarEventos(lista){

    contenedor.innerHTML = "";

    const agrupados = {};

    lista.forEach(evento => {

        const año = evento.fecha.match(/\d{4}$/)?.[0];

        if(!agrupados[año]){
            agrupados[año] = [];
        }

        agrupados[año].push(evento);

    });

    Object.keys(agrupados)
        .sort((a,b) => Number(a) - Number(b))
        .forEach(año => {

        contenedor.innerHTML += `
            <h2 class="titulo-año">${año}</h2>
            <div class="eventos-año" id="grupo-${año}"></div>
        `;

        const grupo = document.getElementById(`grupo-${año}`);

        agrupados[año].forEach(evento => {

            grupo.innerHTML += `

                <div class="evento">

                    <div class="evento-header">
                        ${evento.lugar}
                    </div>

                    <div class="evento-content">

                        <div class="fecha">
                            📅 ${evento.fecha}
                        </div>

                        <div class="lugar">
                            ${evento.lugar}
                        </div>

                        <div class="motivo">
                            🎉 ${evento.motivo}
                        </div>

                        <div class="comparsas">

                            ${evento.comparsas.map(comparsa =>
                                `<span class="badge">${comparsa}</span>`
                            ).join("")}

                        </div>

                    </div>

                </div>

            `;

        });

    });

}

mostrarEventos(eventos);

document
.getElementById("search")
.addEventListener("input", function(){

    const texto = this.value.toLowerCase();

    const filtrados = eventos.filter(evento =>

        evento.lugar.toLowerCase().includes(texto) ||
        evento.motivo.toLowerCase().includes(texto) ||
        evento.comparsas.join(" ").toLowerCase().includes(texto)

    );

    mostrarEventos(filtrados);

});

</script>
